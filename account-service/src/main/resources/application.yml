spring:
  application:
    name: account-service
  threads:
    virtual:
      enabled: true   # Java 21 virtual threads: better throughput for I/O-bound request handling
  datasource:
    url: jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  h2:
    console:
      enabled: false

server:
  port: 8081

# Emit logs as JSON (Elastic Common Schema). The traceId set by TraceFilter (in the MDC)
# is included automatically in each log line.
logging:
  structured:
    format:
      console: ecs
  level:
    com.eventledger: INFO

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: always
